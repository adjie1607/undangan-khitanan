<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Khitanan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .invitation-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .guest-section {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .guest-name {
            font-size: 22px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }
        .open-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .open-btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <h1>Tasyakuran Khitanan</h1>
        <p class="subtitle">Zoe Raja Pratama</p>

        <p>Kepada Yth. Bapak/Ibu/Saudara/i:</p>
        
        <div class="guest-section">
            <!-- Tempat nama tamu akan muncul -->
            <div class="guest-name" id="nama-tamu">Tamu Spesial</div>
        </div>

        <p style="font-size: 12px; color: #95a5a6;">Mohon maaf apabila ada kesalahan penulisan nama/gelar</p>

        <button class="open-btn">Buka Undangan</button>
    </div>

    <script>
        // Logika JavaScript untuk mengambil parameter URL
        // Contoh: url.com/?to=Ka%20Maya
        
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('to');

        // Jika ada parameter 'to', ganti teksnya. Jika kosong, biarkan default.
        if (guestName) {
            document.getElementById('nama-tamu').textContent = guestName;
        }
    </script>

</body>
</html>
